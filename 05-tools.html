<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05 工具資源</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #f0f2f5; color: #2c3e50; }

  .header-banner {
    background: linear-gradient(135deg, #2d1b4e 0%, #8e44ad 60%, #6c3483 100%);
    color: white; padding: 36px 28px; text-align: center;
    border-bottom: 4px solid #8e44ad; position: relative; overflow: hidden;
  }
  .header-banner::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: rgba(155,89,182,0.15);
  }
  .header-banner h1 { font-size: 1.7rem; font-weight: 700; position: relative; z-index: 1; }
  .header-banner p { margin-top: 8px; opacity: 0.8; font-size: 0.92rem; position: relative; z-index: 1; }

  .container { max-width: 880px; margin: 0 auto; padding: 24px 20px 40px; }
  .breadcrumb { font-size: 0.8rem; color: #95a5a6; margin-bottom: 20px; }
  .section-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #95a5a6; margin-bottom: 14px; }

  /* 分類卡片 */
  .group-block { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); border: 1px solid #e8ecef; transition: box-shadow 0.2s; }
  .group-block:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
  .group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #f0f2f5; }
  .group-icon { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #8e44ad, #9b59b6); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .group-title { font-size: 1rem; font-weight: 700; color: #2c3e50; }
  .group-count { margin-left: auto; background: #f5eef8; color: #8e44ad; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

  /* 一般連結 */
  .link-list { list-style: none; }
  .link-list li { border-bottom: 1px dashed #eef0f2; }
  .link-list li:last-child { border-bottom: none; }
  .link-list a { color: #8e44ad; text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 7px 0; font-size: 0.85rem; transition: color 0.15s; }
  .link-list a:hover { color: #6c3483; }
  .link-list a::before { content: '›'; font-size: 1rem; color: #bdc3c7; }

  /* 系列折疊區塊 */
  .series-block { border: 1px solid #e8ecef; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .series-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; cursor: pointer;
    background: #f8f9fa; border: none; width: 100%; text-align: left;
    font-family: inherit; font-size: 0.88rem; font-weight: 600; color: #2c3e50;
    transition: background 0.15s;
  }
  .series-toggle:hover { background: #f0f2f5; }
  .series-icon { font-size: 1rem; }
  .series-title { flex: 1; }
  .series-badge { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .series-arrow { font-size: 0.75rem; color: #95a5a6; transition: transform 0.2s; }
  .series-block.open .series-arrow { transform: rotate(90deg); }

  .series-steps { display: none; padding: 4px 0; border-top: 1px solid #eef0f2; }
  .series-block.open .series-steps { display: block; }
  .series-steps a {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px 8px 36px; font-size: 0.83rem;
    color: #8e44ad; text-decoration: none;
    border-bottom: 1px dashed #f0f2f5; transition: background 0.1s;
  }
  .series-steps a:last-child { border-bottom: none; }
  .series-steps a:hover { background: #f8f9fa; color: #6c3483; }
  .series-steps a::before { content: '·'; color: #bdc3c7; font-size: 1.2rem; }

  /* 狀態 */
  .state-box { background: white; border-radius: 10px; padding: 48px 20px; text-align: center; color: #95a5a6; font-size: 0.9rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #8e44ad; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; padding: 20px; color: #c53030; text-align: center; font-size: 0.88rem; }

  @media (max-width: 600px) { .header-banner h1 { font-size: 1.3rem; } }
</style>
</head>
<body>

<div class="header-banner">
  <h1>05 工具資源 (Tools)</h1>
  <p>開發工具、API 文件與腳本資源</p>
</div>

<div class="container">
  <div class="breadcrumb">🏠 首頁 / 05 工具資源</div>
  <div class="section-label">功能分類</div>
  <div id="content">
    <div class="state-box"><div class="spinner"></div>載入中...</div>
  </div>
</div>

<script>
  const DATA_URL = 'https://mpwikijs.github.io/wiki-data/data/05-tools.json';

  fetch(DATA_URL)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      const content = document.getElementById('content');
      content.innerHTML = '';
      if (!data.categories || data.categories.length === 0) {
        content.innerHTML = '<div class="state-box">此分類下目前沒有任何頁面。</div>';
        return;
      }
      data.categories.forEach(cat => {
        const block = document.createElement('div');
        block.className = 'group-block';

        const seriesItems = cat.links.filter(l => l.type === 'series');
        const linkItems   = cat.links.filter(l => l.type === 'link');
        const total = seriesItems.length + linkItems.length;

        let innerHtml = `
          <div class="group-header">
            <div class="group-icon">${cat.links[0]?.icon || '📁'}</div>
            <div class="group-title">${cat.name}</div>
            <span class="group-count">${total} 項</span>
          </div>
          <ul class="link-list">`;

        // 系列區塊
        seriesItems.forEach((s, idx) => {
          const id = 'series-' + cat.name + '-' + idx;
          const stepsHtml = s.steps.map(step =>
            `<a href="${step.url}" target="_top">${step.title}</a>`
          ).join('');
          innerHtml += `
            </ul>
            <div class="series-block" id="${id}">
              <button class="series-toggle" onclick="toggleSeries('${id}')">
                <span class="series-icon">${s.icon || '📚'}</span>
                <span class="series-title">${s.seriesTitle}</span>
                <span class="series-badge">${s.steps.length} 篇</span>
                <span class="series-arrow">▶</span>
              </button>
              <div class="series-steps">${stepsHtml}</div>
            </div>
            <ul class="link-list">`;
        });

        // 一般連結
        linkItems.forEach(l => {
          innerHtml += `<li><a href="${l.url}" target="_top">${l.title}</a></li>`;
        });

        innerHtml += `</ul>`;
        block.innerHTML = innerHtml;
        content.appendChild(block);
      });
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<div class="error-state">⚠️ 資料載入失敗<br><small>${err.message}</small></div>`;
    });

  function toggleSeries(id) {
    const block = document.getElementById(id);
    block.classList.toggle('open');
  }
</script>
</body>
</html>
